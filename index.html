<!DOCTYPE html>
<html>
<head>
    <title>VisualMind</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 500px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        #response {
            margin-top: 20px;
            padding: 10px;
            background: #334155;
            border-radius: 8px;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🧠 VisualMind</h1>

    <input type="file" id="image">
    <input type="text" id="message" placeholder="Ask something about the image...">
    <button onclick="send()">Send</button>

    <div id="response">Response will appear here...</div>
</div>

<script>
async function send() {
    const fileInput = document.getElementById("image");
    const message = document.getElementById("message").value;
    const responseBox = document.getElementById("response");

    if (!fileInput.files[0]) {
        alert("Upload an image first");
        return;
    }

    responseBox.innerText = "Thinking...";

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("message", message);

    try {
        const res = await fetch("/chat", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        console.log(data);  // 👈 DEBUG

        responseBox.innerText =
            data.response ||
            data.error ||
            "No response from server";

    } catch (err) {
        responseBox.innerText = "Request failed: " + err;
    }
}
</script>

</body>
</html>
