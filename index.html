<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VisualMind</title>

<style>
body { font-family: Arial; background:#f4f7fb; margin:0; padding:0; }
.container { max-width:700px; margin:auto; padding:20px; }
.chat { margin-top:20px; }
.msg { margin:10px 0; }
.user { text-align:right; }
.bot { text-align:left; }
button { padding:10px; }
</style>
</head>

<body>

<div class="container">

<h2>VisualMind</h2>

<input type="file" id="file" accept="image/*"><br><br>

<input type="text" id="msg" placeholder="Ask something..." style="width:80%">
<button onclick="sendMsg()">Send</button>

<div class="chat" id="chat"></div>

</div>

<script>

const API = ""; // ✅ FIXED (IMPORTANT)

let selectedFile = null;

document.getElementById("file").addEventListener("change", (e)=>{
  selectedFile = e.target.files[0];
});

async function sendMsg() {
  const text = document.getElementById("msg").value;

  if (!selectedFile) {
    alert("Upload image first");
    return;
  }

  addMessage(text, "user");

  const formData = new FormData();
  formData.append("file", selectedFile);
  formData.append("message", text);

  try {
    const res = await fetch(`${API}/chat`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    addMessage(data.response, "bot");

  } catch (err) {
    addMessage("Error connecting to server", "bot");
  }

  document.getElementById("msg").value = "";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

</script>

</body>
</html>
